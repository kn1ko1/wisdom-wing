<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>The Wisdom Archive</title>
    
    <!-- PWA Meta -->
    <meta name="theme-color" content="#1a1f1c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    
    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Source Sans 3', sans-serif;
            background: #0f1310;
            color: #e8dcc5;
            line-height: 1.6;
        }
        
        .archive-container {
            min-height: 100vh;
            padding: 2rem;
            transition: opacity 0.3s ease;
        }
        
        .archive-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .archive-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 0.5rem;
            color: #f3e5ab;
        }
        
        .subtitle {
            font-size: 1rem;
            color: #b7aa95;
            font-weight: 300;
        }
        
        .dossier-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        
        .tome {
            background: #1a1f1c;
            border: 1px solid #3a423a;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        
        .tome:hover {
            transform: translateY(-4px);
            border-color: #5d7a5c;
        }
        
        .tome-cover {
            padding: 2rem;
            text-align: center;
        }
        
        .tome-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 1rem;
        }
        
        .tome-cover h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: #f3e5ab;
        }
        
        .tome-details {
            padding: 1.5rem;
            background: #0f1310;
            border-top: 1px solid #3a423a;
        }
        
        .tome-details p {
            color: #b7aa95;
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }
        
        .status {
            display: inline-block;
            background: #262b27;
            padding: 0.25rem 0.75rem;
            border-radius: 2px;
            font-size: 0.8rem;
            color: #5d7a5c;
        }
        
        main {
            width: 100%;
        }
        
        .offline-notice {
            background: #8b7e6b;
            color: #0f1310;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }
        
        .error-message {
            background: #8b3a3a;
            color: #f3e5ab;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
        }
    </style>
    
    <!-- Additional styles for new features -->
    <style>
        /* Bookmark indicator */
        .bookmark-btn {
            background: none;
            border: none;
            color: #b7aa95;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s ease;
            padding: 0.5rem;
        }
        
        .bookmark-btn.active {
            color: #d4b68a;
        }
        
        /* Loading state */
        .archive-loader {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 2px solid #3a423a;
            border-top-color: #d4b68a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Progress indicators */
        .category-progress {
            margin-top: 1rem;
            padding: 0.5rem;
            background: #1a1f1c;
            border-left: 2px solid #5d7a5c;
        }
        
        .progress-bar {
            height: 4px;
            background: #3a423a;
            margin: 0.5rem 0;
        }
        
        .progress-fill {
            height: 100%;
            background: #5d7a5c;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        /* Stats panel */
        .stats-panel {
            background: #262b27;
            border: 1px solid #3a423a;
            padding: 1.5rem;
            margin: 1rem 0;
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-family: 'Playfair Display', serif;
            color: #f3e5ab;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: #b7aa95;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="archive-container" style="opacity: 0; transition: opacity 0.3s ease;">
        <header class="archive-header">
            <h1>The Wisdom Archive</h1>
            <p class="subtitle">Peeling back the layers of human echoes.</p>
        </header>
        
        <main class="dossier-grid">
            <!-- Categories will be loaded here by app.js -->
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('[Wisdom Archive] Service Worker registered:', registration.scope);
                        
                        // Check for updates
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            console.log('[Wisdom Archive] New service worker installing...');
                        });
                    })
                    .catch(error => {
                        console.error('[Wisdom Archive] Service Worker registration failed:', error);
                    });
                
                // Listen for controller change (new SW activated)
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    console.log('[Wisdom Archive] New service worker activated');
                    window.location.reload();
                });
            });
            
            // Background sync for offline answers
            navigator.serviceWorker.ready.then(registration => {
                if ('sync' in registration) {
                    setInterval(() => {
                        if (navigator.onLine) {
                            registration.sync.register('sync-answers')
                                .then(() => {
                                    console.log('[Wisdom Archive] Background sync registered');
                                })
                                .catch(console.error);
                        }
                    }, 5 * 60 * 1000); // Check every 5 minutes
                }
            });
        }
        
        // Handle offline/online events
        window.addEventListener('online', () => {
            document.body.classList.remove('offline');
            // Attempt to sync offline data
            if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({
                    type: 'SYNC_NOW'
                });
            }
        });
        
        window.addEventListener('offline', () => {
            document.body.classList.add('offline');
        });
    </script>
    
    <!-- Fallback for browsers without service worker -->
    <script>
        if (!navigator.onLine) {
            document.body.classList.add('offline');
        }
    </script>
</body>
</html>
